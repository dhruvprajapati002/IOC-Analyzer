<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ThreatLens – Use Case Diagram</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #f8fafc; display: flex; justify-content: center; padding: 40px 20px; }
.page { background: #fff; width: 1000px; border: 1px solid #e2e8f0; border-radius: 16px; padding: 40px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
h1 { text-align: center; font-size: 20px; font-weight: 700; color: #1e293b; margin-bottom: 6px; }
.subtitle { text-align: center; font-size: 12px; color: #64748b; margin-bottom: 32px; }
svg text { font-family: 'Segoe UI', Arial, sans-serif; }
</style>
</head>
<body>
<div class="page">
  <h1>ThreatLens — Use Case Diagram</h1>
  <p class="subtitle">System Boundaries · Actors · Primary Use Cases</p>

  <svg width="920" height="650" viewBox="0 0 920 650">
    <defs>
      <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto"><polygon points="0 0,8 3.5,0 7" fill="#64748b"/></marker>
    </defs>

    <!-- System Boundary -->
    <rect x="250" y="40" width="420" height="570" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="2" stroke-dasharray="8,4"/>
    <text x="460" y="65" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">ThreatLens CTI Platform Boundary</text>

    <!-- Actors - Left Side -->
    <g transform="translate(80, 160)">
      <circle cx="40" cy="20" r="15" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
      <line x1="40" y1="35" x2="40" y2="70" stroke="#3b82f6" stroke-width="2"/>
      <line x1="15" y1="50" x2="65" y2="50" stroke="#3b82f6" stroke-width="2"/>
      <line x1="40" y1="70" x2="20" y2="100" stroke="#3b82f6" stroke-width="2"/>
      <line x1="40" y1="70" x2="60" y2="100" stroke="#3b82f6" stroke-width="2"/>
      <text x="40" y="125" text-anchor="middle" font-size="12" font-weight="700" fill="#1e293b">Guest User</text>
      <text x="40" y="140" text-anchor="middle" font-size="10" fill="#64748b">Anonymous</text>
    </g>

    <g transform="translate(80, 420)">
      <circle cx="40" cy="20" r="15" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
      <line x1="40" y1="35" x2="40" y2="70" stroke="#16a34a" stroke-width="2"/>
      <line x1="15" y1="50" x2="65" y2="50" stroke="#16a34a" stroke-width="2"/>
      <line x1="40" y1="70" x2="20" y2="100" stroke="#16a34a" stroke-width="2"/>
      <line x1="40" y1="70" x2="60" y2="100" stroke="#16a34a" stroke-width="2"/>
      <text x="40" y="125" text-anchor="middle" font-size="12" font-weight="700" fill="#1e293b">SecOps Analyst</text>
      <text x="40" y="140" text-anchor="middle" font-size="10" fill="#64748b">Registered</text>
    </g>

    <!-- Arrow generalizing Analyst to User -->
    <line x1="120" y1="410" x2="120" y2="320" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="130" y="370" font-size="10" fill="#64748b" transform="rotate(-90,130,370)">Extends / Inherits</text>

    <!-- Actors - Right Side -->
    <g transform="translate(760, 200)">
      <rect x="0" y="0" width="80" height="80" rx="10" fill="#fff1f2" stroke="#e11d48" stroke-width="2"/>
      <text x="40" y="35" text-anchor="middle" font-size="20">🌐</text>
      <text x="40" y="55" text-anchor="middle" font-size="11" font-weight="700" fill="#1e293b">External</text>
      <text x="40" y="70" text-anchor="middle" font-size="10" fill="#64748b">OSINT APIs</text>
    </g>

    <g transform="translate(760, 400)">
      <rect x="0" y="0" width="80" height="80" rx="10" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/>
      <text x="40" y="35" text-anchor="middle" font-size="20">💾</text>
      <text x="40" y="55" text-anchor="middle" font-size="11" font-weight="700" fill="#1e293b">Database</text>
      <text x="40" y="70" text-anchor="middle" font-size="10" fill="#64748b">MongoDB</text>
    </g>

    <!-- Use Cases -->
    <g transform="translate(360, 100)">
      <ellipse cx="100" cy="30" rx="80" ry="25" fill="#fff" stroke="#3b82f6" stroke-width="2"/>
      <text x="100" y="34" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">Submit IOC for Analysis</text>
    </g>

    <g transform="translate(360, 180)">
      <ellipse cx="100" cy="30" rx="80" ry="25" fill="#fff" stroke="#3b82f6" stroke-width="2"/>
      <text x="100" y="34" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">View Unified Report</text>
    </g>

    <g transform="translate(360, 260)">
      <ellipse cx="100" cy="30" rx="80" ry="25" fill="#fff" stroke="#16a34a" stroke-width="2"/>
      <text x="100" y="34" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">Login / Authenticate</text>
    </g>

    <g transform="translate(360, 340)">
      <ellipse cx="100" cy="30" rx="80" ry="25" fill="#fff" stroke="#16a34a" stroke-width="2"/>
      <text x="100" y="34" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">View Personal History</text>
    </g>

    <g transform="translate(360, 420)">
      <ellipse cx="100" cy="30" rx="80" ry="25" fill="#fff" stroke="#16a34a" stroke-width="2"/>
      <text x="100" y="34" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">Access Intel Dashboard</text>
    </g>

    <g transform="translate(360, 500)">
      <ellipse cx="100" cy="30" rx="80" ry="25" fill="#fff" stroke="#16a34a" stroke-width="2"/>
      <text x="100" y="34" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">Export Analysis (CSV/JSON)</text>
    </g>

    <!-- Lines from Guest to Use Cases -->
    <line x1="160" y1="210" x2="360" y2="130" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,2"/>
    <line x1="160" y1="210" x2="360" y2="210" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,2"/>

    <!-- Lines from Analyst to Use Cases -->
    <line x1="160" y1="470" x2="360" y2="290" stroke="#16a34a" stroke-width="1.5"/>
    <line x1="160" y1="470" x2="360" y2="370" stroke="#16a34a" stroke-width="1.5"/>
    <line x1="160" y1="470" x2="360" y2="450" stroke="#16a34a" stroke-width="1.5"/>
    <line x1="160" y1="470" x2="360" y2="530" stroke="#16a34a" stroke-width="1.5"/>

    <!-- Lines to External OSINT APIs -->
    <line x1="560" y1="130" x2="760" y2="230" stroke="#e11d48" stroke-width="1.5"/>
    <text x="630" y="165" font-size="10" fill="#64748b" transform="rotate(22,630,165)">&lt;&lt;includes&gt;&gt;</text>

    <!-- Lines to Database -->
    <line x1="560" y1="210" x2="760" y2="430" stroke="#ca8a04" stroke-width="1.5"/>
    <line x1="560" y1="370" x2="760" y2="440" stroke="#ca8a04" stroke-width="1.5"/>
    <line x1="560" y1="450" x2="760" y2="450" stroke="#ca8a04" stroke-width="1.5"/>
  </svg>
</div>
</body>
</html>
