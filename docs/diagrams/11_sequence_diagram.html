<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ThreatLens – Sequence Diagram</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #f8fafc; display: flex; justify-content: center; padding: 40px 20px; }
.page { background: #fff; width: 1000px; border: 1px solid #e2e8f0; border-radius: 16px; padding: 40px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
h1 { text-align: center; font-size: 20px; font-weight: 700; color: #1e293b; margin-bottom: 6px; }
.subtitle { text-align: center; font-size: 12px; color: #64748b; margin-bottom: 32px; }
svg text { font-family: 'Segoe UI', Arial, sans-serif; }
</style>
</head>
<body>
<div class="page">
  <h1>ThreatLens — Sequence Diagram</h1>
  <p class="subtitle">IOC Analysis Execution Timeline · Parallel API Fetching · Caching Mechanism</p>

  <svg width="920" height="700" viewBox="0 0 920 700">
    <defs>
      <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto"><polygon points="0 0,8 3.5,0 7" fill="#475569"/></marker>
      <marker id="arrow-dash" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto"><polygon points="0 0,8 3.5,0 7" fill="#94a3b8"/></marker>
    </defs>

    <!-- Lifelines -->
    <line x1="100" y1="80" x2="100" y2="650" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6,4"/>
    <line x1="280" y1="80" x2="280" y2="650" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6,4"/>
    <line x1="460" y1="80" x2="460" y2="650" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6,4"/>
    <line x1="640" y1="80" x2="640" y2="650" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6,4"/>
    <line x1="820" y1="80" x2="820" y2="650" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6,4"/>

    <!-- Actors / Entities -->
    <rect x="50" y="40" width="100" height="40" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
    <text x="100" y="64" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8">Analyst</text>

    <rect x="230" y="40" width="100" height="40" rx="6" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="2"/>
    <text x="280" y="64" text-anchor="middle" font-size="12" font-weight="700" fill="#0369a1">Frontend (UI)</text>

    <rect x="410" y="40" width="100" height="40" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
    <text x="460" y="64" text-anchor="middle" font-size="12" font-weight="700" fill="#15803d">Backend API</text>

    <rect x="590" y="40" width="100" height="40" rx="6" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/>
    <text x="640" y="64" text-anchor="middle" font-size="12" font-weight="700" fill="#a16207">MongoDB</text>

    <rect x="770" y="40" width="100" height="40" rx="6" fill="#fff1f2" stroke="#e11d48" stroke-width="2"/>
    <text x="820" y="64" text-anchor="middle" font-size="12" font-weight="700" fill="#be123c">External APIs</text>

    <!-- Activation Boxes -->
    <rect x="95" y="100" width="10" height="520" fill="#bfdbfe"/>
    <rect x="275" y="120" width="10" height="500" fill="#bae6fd"/>
    <rect x="455" y="140" width="10" height="460" fill="#bbf7d0"/>
    <rect x="635" y="200" width="10" height="40" fill="#fef08a"/>
    <rect x="635" y="520" width="10" height="40" fill="#fef08a"/>
    <rect x="815" y="340" width="10" height="80" fill="#fecdd3"/>

    <!-- Messages -->
    <!-- Analyst to Frontend -->
    <line x1="105" y1="120" x2="275" y2="120" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="190" y="115" text-anchor="middle" font-size="11" fill="#1e293b">1. Submit IOC Form</text>

    <!-- Frontend to Backend -->
    <line x1="285" y1="140" x2="455" y2="140" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="370" y="135" text-anchor="middle" font-size="11" fill="#1e293b">2. POST /api/ioc-v2</text>

    <!-- Validation (Self) -->
    <line x1="465" y1="160" x2="495" y2="160" stroke="#475569" stroke-width="1.5"/>
    <line x1="495" y1="160" x2="495" y2="180" stroke="#475569" stroke-width="1.5"/>
    <line x1="495" y1="180" x2="465" y2="180" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="500" y="174" font-size="10" fill="#64748b">3. Validate &amp; Sanitize</text>

    <!-- Backend to DB (Cache Check) -->
    <line x1="465" y1="200" x2="635" y2="200" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="550" y="195" text-anchor="middle" font-size="11" fill="#1e293b">4. Find in IocCache</text>

    <!-- DB to Backend (Cache Miss) -->
    <line x1="635" y1="240" x2="465" y2="240" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-dash)"/>
    <text x="550" y="235" text-anchor="middle" font-size="11" fill="#64748b">5. Cache Miss (Null)</text>

    <!-- Orchestrator Box -->
    <rect x="430" y="280" width="420" height="180" fill="none" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="440" y="295" font-size="10" font-weight="700" fill="#7e22ce">ALT / PARALLEL (Promise.allSettled)</text>

    <!-- Backend to External APIs -->
    <line x1="465" y1="340" x2="815" y2="340" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="640" y="335" text-anchor="middle" font-size="11" fill="#1e293b">6. Fetch APIs (VT, GreyNoise, etc.)</text>

    <!-- External APIs to Backend -->
    <line x1="815" y1="420" x2="465" y2="420" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-dash)"/>
    <text x="640" y="415" text-anchor="middle" font-size="11" fill="#64748b">7. Return JSON Responses</text>

    <!-- Normalise (Self) -->
    <line x1="465" y1="480" x2="495" y2="480" stroke="#475569" stroke-width="1.5"/>
    <line x1="495" y1="480" x2="495" y2="500" stroke="#475569" stroke-width="1.5"/>
    <line x1="495" y1="500" x2="465" y2="500" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="500" y="494" font-size="10" fill="#64748b">8. Calculate Risk Score</text>

    <!-- Backend to DB (Save) -->
    <line x1="465" y1="520" x2="635" y2="520" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="550" y="515" text-anchor="middle" font-size="11" fill="#1e293b">9. Save Cache &amp; History</text>

    <line x1="635" y1="560" x2="465" y2="560" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-dash)"/>
    <text x="550" y="555" text-anchor="middle" font-size="11" fill="#64748b">10. Ack</text>

    <!-- Backend to Frontend -->
    <line x1="455" y1="600" x2="285" y2="600" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-dash)"/>
    <text x="370" y="595" text-anchor="middle" font-size="11" fill="#64748b">11. Return Unified Report</text>

    <!-- Frontend to Analyst -->
    <line x1="275" y1="620" x2="105" y2="620" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-dash)"/>
    <text x="190" y="615" text-anchor="middle" font-size="11" fill="#64748b">12. Render Dashboard UI</text>

  </svg>
</div>
</body>
</html>
