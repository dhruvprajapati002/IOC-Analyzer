<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ThreatLens – Activity Diagram</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #f8fafc; display: flex; justify-content: center; padding: 40px 20px; }
.page { background: #fff; width: 1000px; border: 1px solid #e2e8f0; border-radius: 16px; padding: 40px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
h1 { text-align: center; font-size: 20px; font-weight: 700; color: #1e293b; margin-bottom: 6px; }
.subtitle { text-align: center; font-size: 12px; color: #64748b; margin-bottom: 32px; }
svg text { font-family: 'Segoe UI', Arial, sans-serif; }
</style>
</head>
<body>
<div class="page">
  <h1>ThreatLens — Activity Diagram</h1>
  <p class="subtitle">IOC Analysis Process Flow · Swimlanes for User, Application, API, and DB</p>

  <svg width="920" height="850" viewBox="0 0 920 850">
    <defs>
      <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto"><polygon points="0 0,8 3.5,0 7" fill="#475569"/></marker>
    </defs>

    <!-- Swimlanes -->
    <rect x="20" y="40" width="220" height="780" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
    <text x="130" y="65" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">Analyst / User</text>

    <rect x="240" y="40" width="220" height="780" fill="#f0f9ff" stroke="#bae6fd" stroke-width="2"/>
    <text x="350" y="65" text-anchor="middle" font-size="14" font-weight="700" fill="#0369a1">Web Application</text>

    <rect x="460" y="40" width="220" height="780" fill="#fefce8" stroke="#fef08a" stroke-width="2"/>
    <text x="570" y="65" text-anchor="middle" font-size="14" font-weight="700" fill="#a16207">MongoDB Cache</text>

    <rect x="680" y="40" width="220" height="780" fill="#fff1f2" stroke="#fecdd3" stroke-width="2"/>
    <text x="790" y="65" text-anchor="middle" font-size="14" font-weight="700" fill="#be123c">External APIs</text>

    <!-- Initial Node -->
    <circle cx="130" cy="110" r="10" fill="#1e293b"/>
    <line x1="130" y1="120" x2="130" y2="150" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- User Action 1 -->
    <rect x="60" y="150" width="140" height="40" rx="20" fill="#fff" stroke="#3b82f6" stroke-width="2"/>
    <text x="130" y="174" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">Input IOC Value</text>
    <line x1="200" y1="170" x2="280" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- App Action 1: Validate -->
    <rect x="280" y="150" width="140" height="40" rx="20" fill="#fff" stroke="#0ea5e9" stroke-width="2"/>
    <text x="350" y="174" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">Validate &amp; Sanitize</text>
    <line x1="350" y1="190" x2="350" y2="220" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- App Decision 1: Valid? -->
    <polygon points="350,220 390,250 350,280 310,250" fill="#fff" stroke="#f59e0b" stroke-width="2"/>
    <text x="350" y="254" text-anchor="middle" font-size="10" font-weight="600" fill="#a16207">Valid?</text>
    
    <!-- Invalid path -->
    <line x1="310" y1="250" x2="130" y2="250" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="220" y="245" font-size="10" fill="#64748b">No</text>
    <rect x="60" y="230" width="140" height="40" rx="20" fill="#fff" stroke="#ef4444" stroke-width="2"/>
    <text x="130" y="254" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">Show Error</text>

    <!-- Valid path -->
    <line x1="350" y1="280" x2="350" y2="310" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="360" y="300" font-size="10" fill="#64748b">Yes</text>

    <!-- App Action 2: Check Cache -->
    <rect x="280" y="310" width="140" height="40" rx="20" fill="#fff" stroke="#0ea5e9" stroke-width="2"/>
    <text x="350" y="334" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">Check Cache</text>
    <line x1="420" y1="330" x2="500" y2="330" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- DB Action 1 -->
    <rect x="500" y="310" width="140" height="40" rx="20" fill="#fff" stroke="#ca8a04" stroke-width="2"/>
    <text x="570" y="334" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">Query IocCache</text>
    <line x1="570" y1="350" x2="570" y2="380" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- DB Decision: Hit? -->
    <polygon points="570,380 610,410 570,440 530,410" fill="#fff" stroke="#f59e0b" stroke-width="2"/>
    <text x="570" y="414" text-anchor="middle" font-size="10" font-weight="600" fill="#a16207">Found?</text>

    <!-- Hit Path -->
    <line x1="530" y1="410" x2="350" y2="410" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="440" y="405" font-size="10" fill="#64748b">Yes (Hit)</text>

    <!-- Miss Path -->
    <line x1="610" y1="410" x2="790" y2="410" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="660" y="405" font-size="10" fill="#64748b">No (Miss)</text>

    <!-- API Actions -->
    <rect x="720" y="390" width="140" height="40" rx="20" fill="#fff" stroke="#e11d48" stroke-width="2"/>
    <text x="790" y="414" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">Fetch External APIs</text>
    <line x1="790" y1="430" x2="790" y2="470" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="720" y="470" width="140" height="40" rx="20" fill="#fff" stroke="#e11d48" stroke-width="2"/>
    <text x="790" y="494" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">Return JSON Data</text>
    <line x1="720" y1="490" x2="420" y2="490" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- App Action 3: Normalise & Score -->
    <rect x="280" y="470" width="140" height="40" rx="20" fill="#fff" stroke="#0ea5e9" stroke-width="2"/>
    <text x="350" y="494" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">Normalise &amp; Score</text>
    <line x1="350" y1="510" x2="350" y2="550" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- App Action 4: Save Cache & History -->
    <rect x="280" y="550" width="140" height="40" rx="20" fill="#fff" stroke="#0ea5e9" stroke-width="2"/>
    <text x="350" y="574" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">Store Result</text>
    <line x1="420" y1="570" x2="500" y2="570" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- DB Action 2: Write -->
    <rect x="500" y="550" width="140" height="40" rx="20" fill="#fff" stroke="#ca8a04" stroke-width="2"/>
    <text x="570" y="574" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">Write to MongoDB</text>

    <!-- Path from Hit (410) down to Store Result / History? -->
    <!-- Actually if Hit, just write to history. We'll join them at a render step -->
    <line x1="350" y1="410" x2="350" y2="630" stroke="#475569" stroke-width="2"/>
    <line x1="350" y1="590" x2="350" y2="630" stroke="#475569" stroke-width="2"/>
    
    <rect x="280" y="630" width="140" height="40" rx="20" fill="#fff" stroke="#0ea5e9" stroke-width="2"/>
    <text x="350" y="654" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">Render Report</text>
    <line x1="280" y1="650" x2="200" y2="650" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- User Action 2: View -->
    <rect x="60" y="630" width="140" height="40" rx="20" fill="#fff" stroke="#3b82f6" stroke-width="2"/>
    <text x="130" y="654" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">View Analysis Results</text>
    <line x1="130" y1="670" x2="130" y2="710" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Final Node -->
    <circle cx="130" cy="720" r="12" fill="#fff" stroke="#1e293b" stroke-width="2"/>
    <circle cx="130" cy="720" r="6" fill="#1e293b"/>
  </svg>
</div>
</body>
</html>
