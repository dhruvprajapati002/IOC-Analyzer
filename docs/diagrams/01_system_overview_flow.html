<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ThreatLens – System Overview Flow</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f8fafc; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 40px 20px; }
  .page { background: #fff; width: 1100px; border: 1px solid #e2e8f0; border-radius: 16px; padding: 40px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  h1 { text-align: center; font-size: 20px; font-weight: 700; color: #1e293b; margin-bottom: 6px; letter-spacing: .4px; }
  .subtitle { text-align: center; font-size: 12px; color: #64748b; margin-bottom: 32px; }
  svg { display: block; margin: 0 auto; }
  /* Node styles */
  .node-user { fill: #eff6ff; stroke: #3b82f6; stroke-width: 2; rx: 10; }
  .node-app  { fill: #f0fdf4; stroke: #22c55e; stroke-width: 2; }
  .node-cache{ fill: #fefce8; stroke: #f59e0b; stroke-width: 2; }
  .node-orch { fill: #faf5ff; stroke: #a855f7; stroke-width: 2; }
  .node-api  { fill: #fff1f2; stroke: #f43f5e; stroke-width: 2; }
  .node-norm { fill: #f0f9ff; stroke: #0ea5e9; stroke-width: 2; }
  .node-score{ fill: #fff7ed; stroke: #f97316; stroke-width: 2; }
  .node-result{ fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; }
  text { font-family: 'Segoe UI', Arial, sans-serif; }
  .label { font-size: 11px; fill: #374151; font-weight: 600; }
  .sublabel { font-size: 9px; fill: #6b7280; }
  .arrow-label { font-size: 9px; fill: #475569; }
  .hit-label { font-size: 9px; fill: #16a34a; font-weight: 600; }
  .miss-label { font-size: 9px; fill: #dc2626; font-weight: 600; }
</style>
</head>
<body>
<div class="page">
  <h1>ThreatLens — System Overview Flow Diagram</h1>
  <p class="subtitle">End-to-end IOC analysis pipeline · Parallel threat intelligence · Caching · Risk scoring</p>

  <svg width="1020" height="780" viewBox="0 0 1020 780">
    <defs>
      <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
        <polygon points="0 0, 8 3.5, 0 7" fill="#64748b"/>
      </marker>
      <marker id="arr-g" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
        <polygon points="0 0, 8 3.5, 0 7" fill="#16a34a"/>
      </marker>
      <marker id="arr-r" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
        <polygon points="0 0, 8 3.5, 0 7" fill="#dc2626"/>
      </marker>
      <marker id="arr-o" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
        <polygon points="0 0, 8 3.5, 0 7" fill="#f97316"/>
      </marker>
    </defs>

    <!-- ── COLUMN 1: USER ── -->
    <rect x="30" y="60" width="130" height="64" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
    <text x="95" y="84" text-anchor="middle" class="label">👤 Analyst / User</text>
    <text x="95" y="100" text-anchor="middle" class="sublabel">Submits IOC value</text>
    <text x="95" y="113" text-anchor="middle" class="sublabel">IP · Domain · URL · Hash</text>

    <!-- Arrow 1 -->
    <line x1="160" y1="92" x2="218" y2="92" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="188" y="86" class="arrow-label" text-anchor="middle">POST /api/ioc-v2</text>

    <!-- ── COLUMN 2: WEB APP ── -->
    <rect x="220" y="60" width="145" height="64" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
    <text x="292" y="82" text-anchor="middle" class="label">🌐 ThreatLens Web App</text>
    <text x="292" y="98" text-anchor="middle" class="sublabel">Next.js 15 App Router</text>
    <text x="292" y="112" text-anchor="middle" class="sublabel">Auth · Validate · Sanitize</text>

    <!-- Arrow down to cache -->
    <line x1="292" y1="124" x2="292" y2="180" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="308" y="158" class="arrow-label">Cache lookup</text>

    <!-- ── CACHE BOX ── -->
    <rect x="195" y="182" width="195" height="70" rx="10" fill="#fefce8" stroke="#f59e0b" stroke-width="2"/>
    <text x="292" y="204" text-anchor="middle" class="label">🗄️ MongoDB Atlas Cache</text>
    <text x="292" y="219" text-anchor="middle" class="sublabel">Compound index {value, type}</text>
    <text x="292" y="232" text-anchor="middle" class="sublabel">TTL: 1 hour · IocCache collection</text>
    <text x="292" y="246" text-anchor="middle" class="sublabel">Avg lookup: ~8ms</text>

    <!-- CACHE HIT path → back to result -->
    <path d="M 195 210 Q 100 210 100 340 Q 100 470 195 470" stroke="#16a34a" stroke-width="2" fill="none" stroke-dasharray="6,3" marker-end="url(#arr-g)"/>
    <text x="48" y="345" class="hit-label" transform="rotate(-90,48,345)">CACHE HIT — Return immediately</text>

    <!-- CACHE MISS arrow down -->
    <line x1="292" y1="252" x2="292" y2="308" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-r)"/>
    <text x="308" y="286" class="miss-label">Cache MISS</text>

    <!-- ── ORCHESTRATOR ── -->
    <rect x="195" y="310" width="195" height="64" rx="10" fill="#faf5ff" stroke="#a855f7" stroke-width="2"/>
    <text x="292" y="333" text-anchor="middle" class="label">⚡ Multi-Source Orchestrator</text>
    <text x="292" y="350" text-anchor="middle" class="sublabel">Promise.allSettled()</text>
    <text x="292" y="364" text-anchor="middle" class="sublabel">Fires all 6 APIs in parallel</text>

    <!-- Arrow right to APIs -->
    <line x1="390" y1="342" x2="445" y2="342" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="416" y="335" class="arrow-label" text-anchor="middle">Parallel</text>

    <!-- ── 6 API BOXES ── -->
    <!-- VirusTotal -->
    <rect x="447" y="170" width="130" height="44" rx="8" fill="#fff1f2" stroke="#f43f5e" stroke-width="1.8"/>
    <text x="512" y="190" text-anchor="middle" class="label" font-size="10">🔴 VirusTotal</text>
    <text x="512" y="205" text-anchor="middle" class="sublabel">IP·Domain·URL·Hash · 4req/min</text>

    <!-- GreyNoise -->
    <rect x="447" y="224" width="130" height="44" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.8"/>
    <text x="512" y="244" text-anchor="middle" class="label" font-size="10">🔵 GreyNoise</text>
    <text x="512" y="259" text-anchor="middle" class="sublabel">IP only · Noise/Riot classify</text>

    <!-- ThreatFox -->
    <rect x="447" y="278" width="130" height="44" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="1.8"/>
    <text x="512" y="298" text-anchor="middle" class="label" font-size="10">🟠 ThreatFox</text>
    <text x="512" y="313" text-anchor="middle" class="sublabel">IP·Domain·Hash · Malware DB</text>

    <!-- URLhaus -->
    <rect x="447" y="332" width="130" height="44" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.8"/>
    <text x="512" y="352" text-anchor="middle" class="label" font-size="10">🟢 URLhaus</text>
    <text x="512" y="367" text-anchor="middle" class="sublabel">URL·Domain · Blacklist DB</text>

    <!-- MalwareBazaar -->
    <rect x="447" y="386" width="130" height="44" rx="8" fill="#faf5ff" stroke="#a855f7" stroke-width="1.8"/>
    <text x="512" y="406" text-anchor="middle" class="label" font-size="10">🟣 MalwareBazaar</text>
    <text x="512" y="421" text-anchor="middle" class="sublabel">Hash only · File hash DB</text>

    <!-- IPQS -->
    <rect x="447" y="440" width="130" height="44" rx="8" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1.8"/>
    <text x="512" y="460" text-anchor="middle" class="label" font-size="10">🔷 IPQS</text>
    <text x="512" y="475" text-anchor="middle" class="sublabel">IP·Domain·URL · Fraud 0-100</text>

    <!-- Lines from orchestrator to each API -->
    <line x1="390" y1="330" x2="447" y2="192" stroke="#a855f7" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="390" y1="335" x2="447" y2="246" stroke="#a855f7" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="390" y1="340" x2="447" y2="300" stroke="#a855f7" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="390" y1="345" x2="447" y2="354" stroke="#a855f7" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="390" y1="350" x2="447" y2="408" stroke="#a855f7" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="390" y1="355" x2="447" y2="462" stroke="#a855f7" stroke-width="1" stroke-dasharray="3,2"/>

    <!-- Lines from each API to normaliser -->
    <line x1="577" y1="192" x2="635" y2="290" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="577" y1="246" x2="635" y2="300" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="577" y1="300" x2="635" y2="310" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="577" y1="354" x2="635" y2="320" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="577" y1="408" x2="635" y2="330" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="577" y1="462" x2="635" y2="340" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>

    <!-- ── NORMALISER ── -->
    <rect x="637" y="270" width="155" height="64" rx="10" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="2"/>
    <text x="714" y="292" text-anchor="middle" class="label">📐 Response Normaliser</text>
    <text x="714" y="308" text-anchor="middle" class="sublabel">Maps each source to</text>
    <text x="714" y="322" text-anchor="middle" class="sublabel">standard unified schema</text>

    <!-- Arrow down to risk score -->
    <line x1="714" y1="334" x2="714" y2="394" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="730" y="368" class="arrow-label">Aggregated data</text>

    <!-- ── RISK SCORE ── -->
    <rect x="637" y="396" width="155" height="70" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
    <text x="714" y="418" text-anchor="middle" class="label">⚖️ Weighted Risk Score</text>
    <text x="714" y="434" text-anchor="middle" class="sublabel">VT×40 + GN×20 + IPQS×10</text>
    <text x="714" y="448" text-anchor="middle" class="sublabel">+ TF×10 + VT_sus×20</text>
    <text x="714" y="462" text-anchor="middle" class="sublabel">Score: 0–100 · Level: Low→Critical</text>

    <!-- Arrow down to cache store -->
    <line x1="714" y1="466" x2="714" y2="524" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="730" y="498" class="arrow-label">Store result</text>

    <!-- ── CACHE STORE ── -->
    <rect x="637" y="526" width="155" height="56" rx="10" fill="#fefce8" stroke="#f59e0b" stroke-width="2"/>
    <text x="714" y="547" text-anchor="middle" class="label">💾 MongoDB Cache Write</text>
    <text x="714" y="562" text-anchor="middle" class="sublabel">TTL 1 hour · IocCache</text>
    <text x="714" y="575" text-anchor="middle" class="sublabel">IocUserHistory saved</text>

    <!-- Arrow left back to result box -->
    <line x1="637" y1="554" x2="390" y2="500" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-g)"/>
    <text x="510" y="518" class="arrow-label" text-anchor="middle">Return unified result</text>

    <!-- ── FINAL RESULT ── -->
    <rect x="195" y="470" width="195" height="70" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2.5"/>
    <text x="292" y="493" text-anchor="middle" class="label" font-size="12">✅ Unified Analysis Result</text>
    <text x="292" y="510" text-anchor="middle" class="sublabel">Risk score · Level · Source details</text>
    <text x="292" y="524" text-anchor="middle" class="sublabel">IOC metadata · Timestamps</text>
    <text x="292" y="537" text-anchor="middle" class="sublabel">Avg response: ~3800ms</text>

    <!-- Arrow back to user -->
    <line x1="292" y1="470" x2="292" y2="124" stroke="#16a34a" stroke-width="0" /><!-- invisible spacer -->
    <line x1="195" y1="505" x2="160" y2="505" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-g)"/>
    <line x1="160" y1="505" x2="95" y2="505" stroke="#16a34a" stroke-width="1.5"/>
    <line x1="95" y1="505" x2="95" y2="124" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-g)"/>
    <text x="50" y="400" class="hit-label" transform="rotate(-90,50,400)">Rendered in UI</text>

    <!-- ── LEGEND ── -->
    <rect x="30" y="600" width="960" height="140" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <text x="510" y="622" text-anchor="middle" font-size="11" font-weight="700" fill="#1e293b">Legend &amp; Flow Notes</text>
    <!-- items -->
    <line x1="50" y1="640" x2="90" y2="640" stroke="#16a34a" stroke-width="2" stroke-dasharray="6,3"/>
    <text x="96" y="644" font-size="10" fill="#374151">Cache HIT path — bypasses all API calls, returns immediately</text>
    <line x1="50" y1="660" x2="90" y2="660" stroke="#dc2626" stroke-width="2" stroke-dasharray="4,3"/>
    <text x="96" y="664" font-size="10" fill="#374151">Cache MISS path — triggers full multi-source analysis</text>
    <line x1="50" y1="680" x2="90" y2="680" stroke="#a855f7" stroke-width="2" stroke-dasharray="3,2"/>
    <text x="96" y="684" font-size="10" fill="#374151">Parallel API dispatch — all 6 sources called simultaneously via Promise.allSettled()</text>
    <rect x="50" y="700" width="14" height="10" rx="2" fill="#fefce8" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="70" y="710" font-size="10" fill="#374151">MongoDB Atlas — IocCache collection, compound index {value:1, type:1}</text>
    <rect x="400" y="635" width="14" height="10" rx="2" fill="#fff1f2" stroke="#f43f5e" stroke-width="1.5"/>
    <text x="420" y="645" font-size="10" fill="#374151">6 Intelligence Sources: VirusTotal · GreyNoise · ThreatFox · URLhaus · MalwareBazaar · IPQS</text>
    <rect x="400" y="655" width="14" height="10" rx="2" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
    <text x="420" y="665" font-size="10" fill="#374151">Unified Result — risk score 0–100, level Low/Medium/High/Critical</text>
    <text x="400" y="700" font-size="10" fill="#374151">Cache hit latency: ~8ms · Cache miss full analysis: ~3800ms avg · Cache TTL: 3600s</text>
  </svg>
</div>
</body>
</html>
